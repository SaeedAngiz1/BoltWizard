<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" role="img" aria-label="BoltWizard — chat streaming demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <clipPath id="reveal1">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;420" dur="2.4s" begin="0s;10s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="reveal2">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;420" dur="1.4s" begin="2.6s;10s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="reveal3">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" values="0;420" dur="1.2s" begin="4.0s;10s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="720" height="48" fill="#1E293B"/>
  <circle cx="24" cy="24" r="6" fill="#7C3AED"/>
  <text x="40" y="29" font-family="ui-sans-serif, system-ui" font-size="14" fill="#E2E8F0" font-weight="700">BoltWizard</text>
  <text x="120" y="29" font-family="ui-sans-serif, system-ui" font-size="13" fill="#94A3B8">/ workspace · main</text>

  <!-- Animated connection pulse -->
  <circle cx="690" cy="24" r="6" fill="#10B981">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="664" y="29" font-family="ui-sans-serif, system-ui" font-size="11" fill="#10B981" text-anchor="end">local LLM</text>

  <!-- User prompt -->
  <rect x="20" y="78" width="600" height="42" rx="10" fill="#5B21B6"/>
  <text x="36" y="105" font-family="ui-sans-serif, system-ui" font-size="14" fill="#EDE9FE" clip-path="url(#reveal1)">Build a Vite + React todo app styled with Tailwind.</text>

  <!-- Assistant message bubble (header) -->
  <text x="20" y="160" font-family="ui-sans-serif, system-ui" font-size="12" fill="#A78BFA">✦ assistant</text>

  <!-- Assistant streaming response (revealed line by line) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo" font-size="13">
    <text x="20" y="184" fill="#E0E7FF" clip-path="url(#reveal2)">I'll write the files. Starting with package.json…</text>
    <text x="20" y="208" fill="#FBBF24" clip-path="url(#reveal3)">&lt;boltAction type="file" path="package.json"&gt;</text>
    <text x="20" y="232" fill="#94A3B8" font-size="11" clip-path="url(#reveal3)">{ "name": "todo-app", "private": true, "type": "module" }</text>
    <text x="20" y="248" fill="#FBBF24" clip-path="url(#reveal3)">&lt;/boltAction&gt;</text>
  </g>

  <!-- Action card slide-in (pre-positioned, opacity-animated) -->
  <g>
    <rect x="20" y="270" width="360" height="64" rx="8" fill="#1E293B" stroke="#FBBF24" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s;10s" fill="freeze"/>
    </rect>
    <text x="36" y="294" font-family="ui-sans-serif, system-ui" font-size="12" fill="#FBBF24" font-weight="700" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s;10s" fill="freeze"/>
      📄 package.json
    </text>
    <text x="36" y="312" font-family="ui-monospace, SFMono-Regular" font-size="11" fill="#94A3B8" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s;10s" fill="freeze"/>
      write · 68 lines · 4 actions pending
    </text>
    <rect x="300" y="280" width="64" height="44" rx="6" fill="#22C55E" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s;10s" fill="freeze"/>
    </rect>
    <text x="332" y="306" font-family="ui-sans-serif, system-ui" font-size="11" fill="#F0FDF4" text-anchor="middle" font-weight="700" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s;10s" fill="freeze"/>
      run
    </text>
  </g>

  <!-- Terminal tail (animated dot-led output) -->
  <rect x="20" y="350" width="680" height="56" rx="8" fill="#0B1120" stroke="#1E293B"/>
  <text x="36" y="372" font-family="ui-monospace, SFMono-Regular" font-size="12" fill="#10B981">$ npm install</text>
  <text x="36" y="390" font-family="ui-monospace, SFMono-Regular" font-size="11" fill="#64748B" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="5.6s;10s" fill="freeze"/>
    added 142 packages, audited 144 packages in 3s
  </text>

  <!-- Cursor blink -->
  <rect x="200" y="362" width="8" height="14" fill="#10B981" opacity="0">
    <animate attributeName="opacity" values="0;1;0;1;0;1" dur="0.8s" begin="5.6s" fill="freeze"/>
  </rect>

  <!-- Watermark corner: BoltWizard -->
  <text x="700" y="410" font-family="ui-sans-serif" font-size="11" fill="#475569" text-anchor="end">BoltWizard · demo · 10s loop</text>
</svg>
