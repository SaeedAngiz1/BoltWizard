<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" role="img" aria-label="BoltWizard — preview running">
  <defs>
    <linearGradient id="appBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>

  <!-- Editor chrome (dark, around the pane) -->
  <rect width="720" height="360" fill="#0F172A"/>

  <!-- Preview pane background -->
  <rect x="20" y="20" width="680" height="320" rx="12" fill="url(#appBg)" stroke="#334155" stroke-width="1"/>

  <!-- Browser chrome inside the preview -->
  <rect x="20" y="20" width="680" height="34" rx="12" fill="#F1F5F9"/>
  <circle cx="40" cy="37" r="5" fill="#EF4444"/>
  <circle cx="56" cy="37" r="5" fill="#F59E0B"/>
  <circle cx="72" cy="37" r="5" fill="#10B981"/>
  <rect x="100" y="26" width="500" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="120" y="41" font-family="monospace" font-size="11" fill="#64748B">🔒 http://localhost:5173</text>
  <circle cx="690" cy="37" r="6" fill="#94A3B8"/>

  <!-- Status pill animates through phases -->
  <g transform="translate(280 70)">
    <rect width="160" height="32" rx="16" fill="#5B21B6">
      <animate attributeName="fill"
        values="#5B21B6;#5B21B6;#5B21B6;#059669;#059669;#059669"
        keyTimes="0;0.25;0.5;0.55;0.8;1"
        dur="4s" repeatCount="indefinite"/>
    </rect>
    <circle cx="20" cy="16" r="5" fill="#FFFFFF">
      <animate attributeName="r" values="5;7;5" dur="0.7s" repeatCount="indefinite"/>
    </circle>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#FFFFFF" font-weight="700">
      <text x="36" y="20">booting
        <animate attributeName="opacity" values="1;0;0;0;0" keyTimes="0;0.25;0.55;0.8;1" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="36" y="20" opacity="0">
        starting server
        <animate attributeName="opacity" values="0;1;0;0;0" keyTimes="0;0.25;0.55;0.8;1" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="36" y="20" opacity="0">
        ✓ dev server ready
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.25;0.55;0.8;1" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Progressing app homepage (fades from skeleton to content) -->
  <g>
    <!-- Hero skeleton (dim, fades out around t=2s) -->
    <rect x="60" y="130" width="600" height="20" rx="4" fill="#E0E7FF" opacity="1">
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.5;0.55" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="160" width="450" height="14" rx="4" fill="#E0E7FF" opacity="1">
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.5;0.55" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Real hero content (fades in at t~2.4s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.65;1" dur="4s" repeatCount="indefinite"/>
      <text x="60" y="146" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#0F172A">Welcome to your Vite + React Todo app</text>
      <text x="60" y="172" font-family="ui-sans-serif, system-ui" font-size="13" fill="#475569">12 todos · 3 done · 2 in progress · auto-saved to localStorage</text>
    </g>

    <!-- Todo item rows -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.6;0.75;1" dur="4s" repeatCount="indefinite"/>
      <g transform="translate(60 200)">
        <rect width="600" height="36" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="20" cy="18" r="8" fill="#16A34A"/>
        <path d="M16 18 L19 21 L24 14" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="22" font-family="ui-sans-serif, system-ui" font-size="12" fill="#94A3B8" text-decoration="line-through">Set up Vite project</text>
        <text x="540" y="22" font-family="ui-sans-serif, system-ui" font-size="11" fill="#16A34A">done</text>
      </g>
      <g transform="translate(60 244)">
        <rect width="600" height="36" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="20" cy="18" r="8" fill="none" stroke="#7C3AED" stroke-width="2"/>
        <text x="40" y="22" font-family="ui-sans-serif, system-ui" font-size="12" fill="#0F172A">Wire Tailwind config</text>
        <text x="540" y="22" font-family="ui-sans-serif, system-ui" font-size="11" fill="#7C3AED">in progress</text>
      </g>
      <g transform="translate(60 288)">
        <rect width="600" height="36" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="20" cy="18" r="8" fill="none" stroke="#CBD5E1" stroke-width="2"/>
        <text x="40" y="22" font-family="ui-sans-serif, system-ui" font-size="12" fill="#0F172A">Add localStorage persistence</text>
        <text x="540" y="22" font-family="ui-sans-serif, system-ui" font-size="11" fill="#94A3B8">todo</text>
      </g>
    </g>

    <!-- Plus button hint -->
    <g>
      <rect x="60" y="334" width="120" height="0" rx="6" fill="#7C3AED">
        <animate attributeName="height" values="0;32" dur="0.4s" begin="3.2s;7.2s" fill="freeze"/>
      </rect>
      <text x="120" y="356" font-family="ui-sans-serif, system-ui" font-size="11" fill="#FFFFFF" font-weight="700" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.2s;7.2s" fill="freeze"/>
        + Add todo
      </text>
    </g>
  </g>

  <!-- Animated cursor on the dev URL -->
  <rect x="244" y="34" width="2" height="14" fill="#0F172A" opacity="0">
    <animate attributeName="opacity" values="0;1;0;1;0" dur="0.8s" begin="1.6s;5.6s" fill="freeze"/>
  </rect>

  <!-- Watermark -->
  <text x="700" y="350" font-family="ui-sans-serif, system-ui" font-size="10" fill="#475569" text-anchor="end">BoltWizard · live preview · 4s loop</text>
</svg>
